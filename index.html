<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0d0b;--card:#1a1713;--border:#2e2920;--cream:#f0e8d8;--accent:#e8813a;--gold:#c9973a;--muted:#7a6e60;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--cream);font-family:'Space Mono',monospace;min-height:100vh;background-image:radial-gradient(ellipse 60% 35% at 50% 0%,rgba(232,129,58,.08) 0%,transparent 70%);}
  header{text-align:center;padding:64px 20px 44px;}
  .orn-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;}
  .orn{flex:1;max-width:140px;height:1px;background:linear-gradient(to right,transparent,var(--gold));}
  .orn.r{background:linear-gradient(to left,transparent,var(--gold));}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,11rem);letter-spacing:.1em;line-height:.85;color:var(--cream);}
  h1 span{color:var(--accent);}
  .tagline{font-family:'Lora',serif;font-style:italic;font-size:1rem;color:var(--muted);margin-top:14px;}
  .header-rule{height:1px;background:linear-gradient(to right,transparent,var(--border),var(--gold),var(--border),transparent);max-width:700px;margin:32px auto 0;}
  .controls{max-width:980px;margin:38px auto 10px;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .sw{flex:1;min-width:200px;position:relative;}
  .sw input{width:100%;padding:12px 16px 12px 42px;background:var(--card);border:1px solid var(--border);border-radius:4px;font-family:'Space Mono',monospace;font-size:.78rem;color:var(--cream);outline:none;transition:border-color .2s;}
  .sw input::placeholder{color:var(--muted);}
  .sw input:focus{border-color:var(--accent);}
  .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;}
  .fb{padding:11px 15px;background:var(--card);border:1px solid var(--border);border-radius:4px;font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .fb:hover{border-color:var(--accent);color:var(--cream);}
  .fb.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .count{max-width:980px;margin:18px auto 20px;padding:0 22px;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .grid{max-width:980px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:22px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;animation:riseUp .45s ease both;}
  .card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.55);border-color:#3e3328;}
  @keyframes riseUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.12s}
  .card:nth-child(4){animation-delay:.16s}.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}
  .card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}.card:nth-child(9){animation-delay:.36s}
  .card:nth-child(10){animation-delay:.40s}.card:nth-child(11){animation-delay:.44s}.card:nth-child(12){animation-delay:.48s}
  .ctb{height:4px;}
  .ch{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 0;}
  .ce{font-size:3.2rem;line-height:1;}
  .cbadge{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:3px;color:#fff;font-weight:700;margin-top:6px;}
  .cb{padding:14px 20px 20px;}
  .cn{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.06em;color:var(--cream);line-height:1;margin-bottom:3px;}
  .cbreed{font-family:'Lora',serif;font-style:italic;font-size:.78rem;color:var(--muted);margin-bottom:12px;}
  .cdiv{height:1px;background:var(--border);margin-bottom:12px;}
  .cp{font-family:'Lora',serif;font-style:italic;font-size:.88rem;color:#c8b89a;line-height:1.65;margin-bottom:16px;}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat{background:#0f0d0b;border-radius:4px;padding:9px 10px;}
  .sl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .sv{font-size:.88rem;font-weight:700;color:var(--cream);}
  .pr{margin-bottom:14px;}
  .ph{display:flex;justify-content:space-between;margin-bottom:5px;}
  .pl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .pn{font-size:.8rem;font-weight:700;}
  .pt{height:4px;background:#252019;border-radius:99px;overflow:hidden;}
  .pf{height:100%;border-radius:99px;}
  .traits{display:flex;flex-wrap:wrap;gap:5px;}
  .trait{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:3px;border:1px solid;}
  .gf{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .gf span{color:var(--cream);margin-left:6px;}
  .noresult{grid-column:1/-1;text-align:center;padding:80px 20px;font-family:'Lora',serif;font-style:italic;font-size:1.2rem;color:var(--muted);}
  footer{text-align:center;padding:28px;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#3e3328;border-top:1px solid var(--border);}
</style>
</head>
<body>
<header>
  <div class="orn-row"><div class="orn"></div><span style="font-size:1.4rem">🐾</span><div class="orn r"></div></div>
  <h1>THE <span>PARTNER</span></h1>
  <p class="tagline">Your guide to every companion — dogs, cats, birds, fish &amp; more</p>
  <div class="header-rule"></div>
</header>
<div class="controls">
  <div class="sw"><span class="si">🔍</span><input type="text" id="searchInput" placeholder="Search pets, traits, personalities…" oninput="render()"></div>
  <button class="fb active" onclick="setFilter('all',this)">All Pets</button>
  <button class="fb" onclick="setFilter('dog',this)">🐕 Dogs</button>
  <button class="fb" onclick="setFilter('cat',this)">🐈 Cats</button>
  <button class="fb" onclick="setFilter('bird',this)">🦜 Birds</button>
  <button class="fb" onclick="setFilter('fish',this)">🐠 Fish</button>
  <button class="fb" onclick="setFilter('small',this)">🐹 Small</button>
  <button class="fb" onclick="setFilter('reptile',this)">🦎 Reptiles</button>
</div>
<div class="count" id="countBar"></div>
<div class="grid" id="grid"></div>
<footer>The Partner &nbsp;·&nbsp; Lifespans are averages for well-cared-for pets</footer>
<script>
const pets=[
  {name:"Golden Retriever",breed:"Canis lupus familiaris",emoji:"🐕",type:"dog",color:"#e8813a",lifespan:"10–12 yrs",size:"Large",care:"Medium",personality:"The eternal optimist. Greets every single person like a long-lost best friend. Genuinely convinced every moment is the greatest moment of their entire life.",traits:["Loyal","Playful","Gentle","Patient"],pop:97,goodFor:"Families, first-time owners"},
  {name:"French Bulldog",breed:"Canis lupus familiaris",emoji:"🐶",type:"dog",color:"#c9973a",lifespan:"10–12 yrs",size:"Small",care:"Low",personality:"A comedian in a bat-eared suit. Stubborn but completely charming — will negotiate every single command into a better deal for themselves.",traits:["Funny","Stubborn","Affectionate","Calm"],pop:94,goodFor:"Apartments, city living"},
  {name:"Border Collie",breed:"Canis lupus familiaris",emoji:"🐩",type:"dog",color:"#5a7a9e",lifespan:"12–15 yrs",size:"Medium",care:"High",personality:"The workaholic genius. Needs a job or will invent one — usually reorganising your furniture or attempting to herd your children.",traits:["Brilliant","Energetic","Focused","Alert"],pop:80,goodFor:"Active owners, farms"},
  {name:"Labrador Retriever",breed:"Canis lupus familiaris",emoji:"🦮",type:"dog",color:"#c9973a",lifespan:"10–12 yrs",size:"Large",care:"Medium",personality:"Pure joy in dog form. Enthusiastic about absolutely everything — especially food. Will keep eating until someone physically stops them.",traits:["Friendly","Outgoing","Reliable","Eager"],pop:96,goodFor:"Families, service roles"},
  {name:"Shih Tzu",breed:"Canis lupus familiaris",emoji:"🌸",type:"dog",color:"#b56db5",lifespan:"10–16 yrs",size:"Small",care:"High",personality:"A tiny emperor. Expects to be carried, adored, and fed by hand. Gives nothing back — and yet you'd rearrange your entire schedule for them.",traits:["Regal","Loving","Stubborn","Cuddly"],pop:82,goodFor:"Seniors, lap-lovers"},
  {name:"German Shepherd",breed:"Canis lupus familiaris",emoji:"🐕‍🦺",type:"dog",color:"#7a6e3a",lifespan:"9–13 yrs",size:"Large",care:"Medium",personality:"Noble and intensely devoted. Bonds deeply with their person, reads the room better than most humans, and takes every single duty very seriously.",traits:["Loyal","Brave","Intelligent","Protective"],pop:93,goodFor:"Active owners, protection"},
  {name:"Dachshund",breed:"Canis lupus familiaris",emoji:"🌭",type:"dog",color:"#a0522d",lifespan:"12–16 yrs",size:"Small",care:"Low",personality:"Enormous personality in an absurdly long body. Utterly fearless — convinced they could take on a bear and walk away victorious without breaking a sweat.",traits:["Bold","Curious","Stubborn","Feisty"],pop:85,goodFor:"Apartments, singles"},
  {name:"Pomeranian",breed:"Canis lupus familiaris",emoji:"🦊",type:"dog",color:"#e8813a",lifespan:"12–16 yrs",size:"Tiny",care:"Medium",personality:"A lion trapped in a fluffball. Barks at things three times their size without hesitation. Has a very complicated relationship with mirrors.",traits:["Bold","Lively","Curious","Proud"],pop:88,goodFor:"Apartments, singles"},
  {name:"Persian Cat",breed:"Felis catus",emoji:"🐱",type:"cat",color:"#b56db5",lifespan:"12–17 yrs",size:"Medium",care:"High",personality:"The living throw pillow. Finds one perfect sunny spot and radiates pure serenity for eight hours straight, with only occasional mild judgment.",traits:["Calm","Gentle","Quiet","Regal"],pop:86,goodFor:"Quiet homes, seniors"},
  {name:"Maine Coon",breed:"Felis catus",emoji:"🦁",type:"cat",color:"#c9973a",lifespan:"12–15 yrs",size:"Large",care:"Medium",personality:"The dog-cat. Follows you room to room, chirps instead of meowing, and is genuinely offended if not invited to every single activity.",traits:["Social","Gentle","Playful","Curious"],pop:88,goodFor:"Families, dog-lovers"},
  {name:"Siamese Cat",breed:"Felis catus",emoji:"😸",type:"cat",color:"#5a7a9e",lifespan:"15–20 yrs",size:"Medium",care:"Medium",personality:"The loudest opinion in the room. Has something to say about everything you do, and is absolutely certain you need to hear it. Right now.",traits:["Vocal","Intelligent","Affectionate","Demanding"],pop:84,goodFor:"Interactive owners"},
  {name:"Scottish Fold",breed:"Felis catus",emoji:"🐈",type:"cat",color:"#5a9e7a",lifespan:"11–14 yrs",size:"Medium",care:"Medium",personality:"An owl in cat clothing. Sits in impossible poses, gazes with ancient wisdom, then suddenly sprints sideways for absolutely no reason.",traits:["Calm","Sweet","Adaptable","Quirky"],pop:90,goodFor:"Apartments, families"},
  {name:"Bengal Cat",breed:"Felis catus",emoji:"🐆",type:"cat",color:"#c9973a",lifespan:"12–16 yrs",size:"Medium",care:"High",personality:"A wild leopard who has agreed — reluctantly — to live with you. Athletic, clever, and entirely uninterested in being told what to do.",traits:["Wild","Athletic","Clever","Adventurous"],pop:83,goodFor:"Experienced owners"},
  {name:"Ragdoll Cat",breed:"Felis catus",emoji:"🐈‍⬛",type:"cat",color:"#b56db5",lifespan:"12–17 yrs",size:"Large",care:"Medium",personality:"Goes completely limp when you pick them up — a cat that genuinely enjoys being held. Follows you like a very fluffy, very silent shadow.",traits:["Gentle","Docile","Loving","Quiet"],pop:87,goodFor:"Families, children"},
  {name:"Budgerigar",breed:"Melopsittacus undulatus",emoji:"🦜",type:"bird",color:"#5a9e7a",lifespan:"5–10 yrs",size:"Small",care:"Low",personality:"Tiny social butterfly with the vocabulary of a toddler and the confidence of a senator. Uses every word learned at peak awkward moments.",traits:["Chatty","Social","Playful","Bright"],pop:89,goodFor:"Beginners, small spaces"},
  {name:"African Grey Parrot",breed:"Psittacus erithacus",emoji:"🦅",type:"bird",color:"#7a8e9e",lifespan:"40–60 yrs",size:"Medium",care:"Very High",personality:"Frighteningly intelligent. Solves puzzles, identifies emotions, and will manipulate you with surgical precision once they have figured you out.",traits:["Genius","Sensitive","Loyal","Complex"],pop:75,goodFor:"Experienced owners only"},
  {name:"Cockatiel",breed:"Nymphicus hollandicus",emoji:"🐦",type:"bird",color:"#c9973a",lifespan:"15–25 yrs",size:"Small",care:"Medium",personality:"The sunny optimist of the bird world. Whistles your favourite song back at you, falls asleep on your shoulder, and sulks when ignored.",traits:["Gentle","Musical","Affectionate","Cheerful"],pop:87,goodFor:"Beginners, families"},
  {name:"Betta Fish",breed:"Betta splendens",emoji:"🐠",type:"fish",color:"#e8453a",lifespan:"2–5 yrs",size:"Tiny",care:"Low",personality:"The brooding loner. Flares glorious fins at their own reflection. Cannot share a tank. Does not want to. Absolutely breathtaking though.",traits:["Proud","Solitary","Bold","Beautiful"],pop:85,goodFor:"Beginners, small spaces"},
  {name:"Goldfish",breed:"Carassius auratus",emoji:"🐟",type:"fish",color:"#c9973a",lifespan:"10–15 yrs",size:"Small",care:"Low",personality:"Perpetually surprised by everything. Swims up, swims away, forgets, swims up again. Far hardier than the bowls people usually keep them in.",traits:["Peaceful","Hardy","Simple","Gentle"],pop:78,goodFor:"Everyone, children"},
  {name:"Clownfish",breed:"Amphiprioninae",emoji:"🐡",type:"fish",color:"#e8813a",lifespan:"6–10 yrs",size:"Small",care:"Medium",personality:"Territorial home-body who never strays far from their anemone. Bonds for life with one partner. Unfairly, spectacularly famous worldwide.",traits:["Loyal","Territorial","Colourful","Calm"],pop:91,goodFor:"Marine tank owners"},
  {name:"Golden Hamster",breed:"Mesocricetus auratus",emoji:"🐹",type:"small",color:"#c9973a",lifespan:"2–3 yrs",size:"Tiny",care:"Low",personality:"Frantic little engineer. Spends all night stuffing cheeks, rearranging bedding, running nowhere fast. Suspicious of hands but secretly loves a pat.",traits:["Busy","Solitary","Curious","Cheeky"],pop:80,goodFor:"Children, small spaces"},
  {name:"Holland Lop Rabbit",breed:"Oryctolagus cuniculus",emoji:"🐰",type:"small",color:"#b56db5",lifespan:"7–14 yrs",size:"Small",care:"Medium",personality:"Velvet-eared and deceptively opinionated. Binkies wildly when happy. Thumps loudly when displeased. An adorable tiny drama queen.",traits:["Gentle","Curious","Social","Expressive"],pop:84,goodFor:"Families, quiet homes"},
  {name:"Guinea Pig",breed:"Cavia porcellus",emoji:"🐾",type:"small",color:"#5a9e7a",lifespan:"4–8 yrs",size:"Small",care:"Medium",personality:"Wheeks at full volume whenever food appears. Purrs when content. Cannot and will not be left alone — loneliness is simply not accepted.",traits:["Social","Vocal","Gentle","Greedy"],pop:82,goodFor:"Children, families"},
  {name:"Bearded Dragon",breed:"Pogona vitticeps",emoji:"🦎",type:"reptile",color:"#c9973a",lifespan:"10–15 yrs",size:"Medium",care:"Medium",personality:"Zen master in lizard form. Basks motionless for hours, then sprints at a cricket. Tolerates cuddles with dignified nonchalance. Watches TV calmly.",traits:["Calm","Docile","Curious","Hardy"],pop:78,goodFor:"Beginners, reptile fans"},
  {name:"Leopard Gecko",breed:"Eublepharis macularius",emoji:"🦗",type:"reptile",color:"#7a9e3a",lifespan:"15–20 yrs",size:"Small",care:"Low",personality:"Nocturnal and wonderfully strange. Licks their own eyeballs. Chirps when happy. Can regrow their tail. A tiny alien who accepts your home as its own.",traits:["Docile","Fascinating","Hardy","Quiet"],pop:76,goodFor:"Beginners, teens"},
];
let af='all';
function setFilter(f,el){af=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function pc(p){return p>=90?'#e8813a':p>=78?'#c9973a':'#5a7a9e';}
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const grid=document.getElementById('grid');
  const filtered=pets.filter(p=>{
    const mc=af==='all'||p.type===af;
    const mq=!q||p.name.toLowerCase().includes(q)||p.personality.toLowerCase().includes(q)||p.traits.some(t=>t.toLowerCase().includes(q))||p.goodFor.toLowerCase().includes(q)||p.type.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById('countBar').textContent='Showing '+filtered.length+' of '+pets.length+' companions';
  if(!filtered.length){grid.innerHTML='<p class="noresult">No companions found — try a different search…</p>';return;}
  grid.innerHTML=filtered.map(p=>`<div class="card"><div class="ctb" style="background:${p.color}"></div><div class="ch"><div class="ce">${p.emoji}</div><div class="cbadge" style="background:${p.color}">${p.type}</div></div><div class="cb"><div class="cn">${p.name}</div><div class="cbreed">${p.breed}</div><div class="cdiv"></div><p class="cp">"${p.personality}"</p><div class="stats"><div class="stat"><div class="sl">Lifespan</div><div class="sv">${p.lifespan}</div></div><div class="stat"><div class="sl">Size</div><div class="sv">${p.size}</div></div><div class="stat"><div class="sl">Care</div><div class="sv">${p.care}</div></div></div><div class="pr"><div class="ph"><span class="pl">Popularity</span><span class="pn" style="color:${pc(p.pop)}">${p.pop}/100</span></div><div class="pt"><div class="pf" style="width:${p.pop}%;background:${pc(p.pop)}"></div></div></div><div class="traits">${p.traits.map(t=>`<span class="trait" style="color:${p.color};border-color:${p.color}44;background:${p.color}12">${t}</span>`).join('')}</div><div class="gf">Good for:<span>${p.goodFor}</span></div></div></div>`).join('');
}
render();
</script>
</body>
</html>
